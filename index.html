<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 패션 광고 성과 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --bg:      #0c1220;
      --sidebar: #111827;
      --card:    #1a2436;
      --border:  #263347;
      --text:    #f1f5f9;
      --text2:   #94a3b8;
      --text3:   #4e6176;
      --accent:  #6366f1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 230px; min-height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-brand { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .sidebar-brand h2 { font-size: 14px; font-weight: 700; }
    .sidebar-brand p  { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-section  { padding: 16px 0 8px; }
    .sidebar-label    { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 6px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; margin: 1px 8px; border-radius: 8px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .2s; }
    .nav-item:hover  { background: rgba(99,102,241,.1); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,.18); color: var(--accent); font-weight: 600; }
    .nav-dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .nav-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Main */
    .main-wrapper { margin-left: 230px; flex: 1; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar { background: var(--sidebar); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; }
    .topbar-label { font-size: 11px; font-weight: 600; color: var(--text3); }
    .media-tabs, .quick-btns { display: flex; gap: 5px; }
    .media-tab, .quick-btn { padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; white-space:nowrap; }
    .media-tab:hover, .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
    .media-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .quick-btn.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent); }
    .apply-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; white-space:nowrap; }
    .apply-btn:hover { opacity: .85; }
    .topbar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink:0; }
    .date-range { display: flex; align-items: center; gap: 6px; }
    .date-input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 12px; color: var(--text); outline: none; color-scheme: dark; }
    .date-input:focus { border-color: var(--accent); }
    .date-sep { font-size: 12px; color: var(--text3); }
    .week-sel { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px; font-size: 12px; color: var(--text); outline: none; cursor: pointer; max-width: 210px; }
    .week-sel:focus { border-color: var(--accent); }
    .cmp-area { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .cmp-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .cmp-btn.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent); }
    .cmp-label { font-size: 11px; color: var(--text3); white-space: nowrap; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; }

    /* Content */
    .content { padding: 22px 24px; display: flex; flex-direction: column; gap: 22px; }

    /* Info strip */
    .info-strip { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.2); border-radius: 10px; padding: 10px 16px; }
    .info-chip { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
    .info-chip strong { color: var(--text); }

    /* Section */
    .sec-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .sec-title::before { content:''; display:inline-block; width:3px; height:15px; background:var(--accent); border-radius:2px; }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
    .kpi-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .kpi-value { font-size: 20px; font-weight: 700; }
    .kpi-sub   { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Three col */
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 900px) { .three-col { grid-template-columns: 1fr; } }

    /* Charts */
    .chart-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
    .chart-sm { position: relative; height: 200px; }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead tr { background: rgba(255,255,255,.03); }
    th { padding: 9px 12px; text-align: right; font-weight: 600; color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th:first-child { text-align: left; }
    td { padding: 9px 12px; text-align: right; border-bottom: 1px solid rgba(255,255,255,.03); color: var(--text); }
    td:first-child { text-align: left; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tr.tbl-total td { font-weight: 700; color: #c7d2fe; border-top: 1px solid var(--border); border-bottom: none; background: rgba(99,102,241,.06); }

    /* Media section */
    .media-section { display: flex; flex-direction: column; gap: 14px; }
    .media-section + .media-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
    .media-header { display: flex; align-items: center; gap: 10px; padding-bottom: 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .media-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px; font-size:13px; font-weight:700; }
    .badge-fb    { background:rgba(79,131,235,.15); color:#4f83eb; border:1px solid rgba(79,131,235,.3); }
    .badge-kakao  { background:rgba(245,159,0,.15);  color:#f59f00; border:1px solid rgba(245,159,0,.3); }
    .badge-tiktok { background:rgba(20,214,185,.15); color:#14d6b9; border:1px solid rgba(20,214,185,.3); }

    /* Dropdown */
    .custom-select {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; color: var(--text); outline: none;
      cursor: pointer; color-scheme: dark; min-width: 160px; max-width: 280px;
    }
    .custom-select:focus { border-color: var(--accent); }

    /* Sub section */
    .sub-sec-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .sub-sec-title span { display: flex; align-items: center; gap: 6px; }
    .sub-sec-title span::before { content:''; display:inline-block; width:3px; height:13px; background:var(--text3); border-radius:2px; }

    /* Creative image */
    .creative-img {
      width: 36px; height: 36px; object-fit: cover;
      border-radius: 6px; border: 1px solid var(--border);
      cursor: zoom-in; vertical-align: middle; flex-shrink: 0;
    }
    .creative-img.kakao-bg { object-fit: contain; background: #fff; padding: 2px; }
    .creative-name-link { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
    .creative-name-link:hover { color: #a5b4fc; }

    /* Hover overlay */
    #imgHover {
      display: none; position: fixed; z-index: 9998; pointer-events: none;
      background: #fff; border-radius: 10px; padding: 8px;
      box-shadow: 0 12px 48px rgba(0,0,0,.55);
      border: 1px solid #e2e8f0;
    }
    #imgHoverImg { display: block; object-fit: contain; border-radius: 6px; }

    /* Group separator row */
    tr.group-end td { border-bottom: 2px solid rgba(255,255,255,.18) !important; }

    /* Image modal */
    #imgModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 9999;
      justify-content: center; align-items: center; cursor: zoom-out;
    }
    #imgModal.open { display: flex; }
    #imgModalInner {
      background: #fff; border-radius: 12px; padding: 16px;
      max-width: 90vw; max-height: 90vh;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }
    #imgModalImg { max-width: 80vw; max-height: 75vh; object-fit: contain; border-radius: 6px; display: block; }
    #imgModalName { font-size: 13px; color: #334155; font-weight: 600; text-align: center; }

    /* AI Summary */
    .ai-card {
      background: linear-gradient(135deg, rgba(34,197,94,.07) 0%, rgba(99,102,241,.07) 100%);
      border: 1px solid rgba(99,102,241,.25); border-radius: 12px; padding: 20px 24px;
    }
    .ai-card-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .ai-badge { background:rgba(34,197,94,.15); color:#22c55e; border:1px solid rgba(34,197,94,.3); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:700; letter-spacing:.5px; }
    .ai-period { font-size:11px; color:var(--text3); }
    .ai-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
    .ai-block {}
    .ai-media-label { font-size:13px; font-weight:700; color:#a5b4fc; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .ai-media-label::before { content:''; display:inline-block; width:3px; height:14px; background:#a5b4fc; border-radius:2px; }
    .ai-adset-block { margin-bottom:18px; }
    .ai-adset-block:last-child { margin-bottom:0; }
    .ai-adset-header { font-size:12px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .ai-adset-body p { font-size:12px; color:var(--text2); line-height:1.65; margin-bottom:5px; }
    .ai-adset-body p.action { color:#fbbf24; padding-left:4px; }
    .ai-adset-body p.action-stop { color:#f87171; padding-left:4px; }
    .ai-adset-body p.good { color:#22c55e; }
    .ai-num { color:#f1f5f9; font-weight:600; }

    /* Creative performance indicators */
    .metric-bad  { color: #f87171 !important; font-weight: 600; }
    .badge-stop  { background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.3); border-radius: 4px; padding: 1px 7px; font-size: 10px; font-weight: 700; white-space: nowrap; margin-left: 4px; }
    .badge-warn  { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); border-radius: 4px; padding: 1px 7px; font-size: 10px; font-weight: 700; white-space: nowrap; margin-left: 4px; }
    tr.row-bad td  { background: rgba(248,113,113,.05) !important; }
    tr.row-warn td { background: rgba(251,191,36,.04) !important; }
    .tbl-legend { font-size: 11px; color: var(--text3); margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; }

    /* State */
    .state-box { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:12px; color:var(--text3); }
    .spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect width="28" height="28" rx="6" fill="#03C75A"/>
        <path d="M7 7h4.2l5.6 8.4V7H21v14h-4.2L11.2 12.6V21H7V7z" fill="#fff"/>
      </svg>
      <div><h2>네이버패션 광고 성과</h2><p>Dashboard</p></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">기획전</div>
      <div id="sidebarNav"></div>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="topbar">
      <span class="topbar-label">매체</span>
      <div class="media-tabs">
        <button class="media-tab active" data-media="all">전체</button>
        <button class="media-tab" data-media="meta">메타</button>
        <button class="media-tab" data-media="kakao">카카오</button>
        <button class="media-tab" data-media="tiktok">틱톡</button>
      </div>
      <div class="topbar-sep"></div>
      <span class="topbar-label">기간</span>
      <div class="date-range">
        <input type="date" id="dateFrom" class="date-input" />
        <span class="date-sep">~</span>
        <input type="date" id="dateTo" class="date-input" />
        <select id="weekSel" class="week-sel"><option value="">주차 선택</option></select>
      </div>
      <div class="quick-btns">
        <button class="quick-btn" data-quick="yesterday">어제</button>
        <button class="quick-btn" data-quick="7days">7일</button>
        <button class="quick-btn" data-quick="14days">14일</button>
        <button class="quick-btn" data-quick="30days">30일</button>
      </div>
      <button id="applyDate" class="apply-btn">적용</button>
      <div class="topbar-sep"></div>
      <button id="compareToggle" class="quick-btn">비교</button>
      <div id="compareArea" class="cmp-area" style="display:none">
        <button class="cmp-btn active" data-cmp="auto">자동</button>
        <button class="cmp-btn" data-cmp="manual">직접 선택</button>
        <div id="cmpManual" style="display:none;align-items:center;gap:4px">
          <input type="date" id="cmpFrom" class="date-input" />
          <span class="date-sep">~</span>
          <input type="date" id="cmpTo" class="date-input" />
        </div>
        <span id="cmpLabel" class="cmp-label"></span>
      </div>
    </div>
    <div class="content" id="content">
      <div class="state-box"><div class="spinner"></div><span>데이터 불러오는 중…</span></div>
    </div>
  </div>
</div>

<!-- Hover overlay -->
<div id="imgHover"><img id="imgHoverImg" src="" alt="" /></div>

<!-- Image Modal -->
<div id="imgModal" onclick="closeImgModal()">
  <div id="imgModalInner" onclick="event.stopPropagation()">
    <img id="imgModalImg" src="" alt="" />
    <div id="imgModalName"></div>
    <button onclick="closeImgModal()" style="padding:6px 18px;border-radius:8px;border:1px solid #cbd5e1;background:#f1f5f9;font-size:12px;cursor:pointer;color:#475569;font-weight:600">닫기</button>
  </div>
</div>

<script>
const CSV_URL   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoZ7VJvp5y0Bg8pzGzArUblfuGMpi8CsJxVEjDFxvdj1qeKICl4dc88ZauWHr_nFAdGFxQEO1kOA5p/pub?gid=0&single=true&output=csv';
const IMAGE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoZ7VJvp5y0Bg8pzGzArUblfuGMpi8CsJxVEjDFxvdj1qeKICl4dc88ZauWHr_nFAdGFxQEO1kOA5p/pub?gid=1516577223&single=true&output=csv';

// 구글 드라이브 링크 → 썸네일 URL 변환
function toDriveImg(url, sz='w120') {
  if (!url) return '';
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=${sz}` : url;
}

function showImgHover(el, e) {
  const h=document.getElementById('imgHover'), img=document.getElementById('imgHoverImg');
  img.src = el.dataset.large;
  if (el.dataset.kakao==='1') { img.style.width='540px'; img.style.height='auto'; img.style.maxHeight='240px'; }
  else                        { img.style.width='360px'; img.style.height='360px'; }
  h.style.display='block'; moveImgHover(e);
}
function moveImgHover(e) {
  const h=document.getElementById('imgHover');
  let x=e.clientX+18, y=e.clientY+18;
  if (x+350>window.innerWidth)  x=e.clientX-350;
  if (y+220>window.innerHeight) y=e.clientY-220;
  h.style.left=x+'px'; h.style.top=y+'px';
}
function hideImgHover() { document.getElementById('imgHover').style.display='none'; }

function openImgModal(thumbUrl, largUrl, name) {
  document.getElementById('imgModalImg').src  = largUrl || thumbUrl;
  document.getElementById('imgModalName').textContent = name || '';
  document.getElementById('imgModal').classList.add('open');
}
function closeImgModal() {
  document.getElementById('imgModal').classList.remove('open');
  document.getElementById('imgModalImg').src = '';
}

Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#263347';

const COLORS = {
  fb:     { bg:'rgba(79,131,235,.8)',  border:'#4f83eb', light:'rgba(79,131,235,.15)' },
  kakao:  { bg:'rgba(245,159,0,.8)',   border:'#f59f00', light:'rgba(245,159,0,.15)'  },
  tiktok: { bg:'rgba(20,214,185,.8)',  border:'#14d6b9', light:'rgba(20,214,185,.15)' },
};
const PALETTE = [
  {bg:'rgba(99,102,241,.8)',border:'#6366f1'},{bg:'rgba(59,130,246,.8)',border:'#3b82f6'},
  {bg:'rgba(16,185,129,.8)',border:'#10b981'},{bg:'rgba(245,158,11,.8)',border:'#f59e0b'},
  {bg:'rgba(239,68,68,.8)',border:'#ef4444'}, {bg:'rgba(168,85,247,.8)',border:'#a855f7'},
  {bg:'rgba(20,184,166,.8)',border:'#14b8a6'},{bg:'rgba(249,115,22,.8)',border:'#f97316'},
  {bg:'rgba(236,72,153,.8)',border:'#ec4899'},{bg:'rgba(132,204,22,.8)',border:'#84cc16'},
  {bg:'rgba(6,182,212,.8)',border:'#06b6d4'}, {bg:'rgba(251,191,36,.8)',border:'#fbbf24'},
];
const pc = i => PALETTE[i % PALETTE.length];

const fmt = {
  won:  v => isNaN(+v) ? '-' : '₩' + Math.round(+v).toLocaleString('ko-KR'),
  num:  v => isNaN(+v) ? '-' : Math.round(+v).toLocaleString('ko-KR'),
  pct:  v => isNaN(+v) ? '-' : (+v).toFixed(2) + '%',
  roas: v => isNaN(+v) ? '-' : Math.round(+v) + '%',
};

function parseNum(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/[₩,%\s]/g,'').replace(/,/g,'')) || 0;
}
function colorOf(m) {
  const k=(m||'').toLowerCase();
  if (k.includes('facebook')||k.includes('meta')||k.includes('fb')) return COLORS.fb;
  if (k.includes('kakao')) return COLORS.kakao;
  if (k.includes('tiktok')||k.includes('틱톡')) return COLORS.tiktok;
  return {bg:'rgba(148,163,184,.8)',border:'#94a3b8',light:'rgba(148,163,184,.15)'};
}
function isFb(m)     { const k=(m||'').toLowerCase(); return k.includes('facebook')||k.includes('meta')||k.includes('fb'); }
function isKakao(m)  { return (m||'').toLowerCase().includes('kakao'); }
function isTiktok(m) { const k=(m||'').toLowerCase(); return k.includes('tiktok')||k.includes('틱톡'); }
function addMetrics(r) { r.ctr=r.imp>0?r.clicks/r.imp*100:0; r.cpc=r.clicks>0?r.spent/r.clicks:0; r.roas=r.spent>0?r.revenue/r.spent*100:0; return r; }

// ── State ────────────────────────────────────────────────────
const state = { media:'all', dateFrom:null, dateTo:null, quick:null, event:null, adsetFilter:{},
  odMedia:'', odCampaign:'', odAdset:'',
  cmpMode:false, cmpAuto:true, cmpFrom:null, cmpTo:null };
let parsed = null, view = null, charts = {}, _minD = '', _maxD = '', imageMap = {};

// ── Parse ────────────────────────────────────────────────────
function buildAggregates(rows) {
  function agg(map) { return Object.values(map).map(r => addMetrics({...r})); }
  const mMap={}, aMap={}, dMap={}, cpDMap={}, adMap={}, adsMap={};
  rows.forEach(r => {
    // media
    if (!mMap[r.media]) mMap[r.media]={media:r.media,spent:0,imp:0,clicks:0,revenue:0,orders:0,budget:0};
    const mm=mMap[r.media]; mm.spent+=r.spent;mm.imp+=r.imp;mm.clicks+=r.clicks;mm.revenue+=r.revenue;mm.orders+=r.orders;
    // adset
    const ak=r.media+'||'+r.adset;
    if (!aMap[ak]) aMap[ak]={media:r.media,campaign:r.campaign,adset:r.adset,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const am=aMap[ak]; am.spent+=r.spent;am.imp+=r.imp;am.clicks+=r.clicks;am.revenue+=r.revenue;am.orders+=r.orders;
    // daily media
    const dk=r.media+'||'+r.date;
    if (!dMap[dk]) dMap[dk]={media:r.media,date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const dm=dMap[dk]; dm.spent+=r.spent;dm.imp+=r.imp;dm.clicks+=r.clicks;dm.revenue+=r.revenue;dm.orders+=r.orders;
    // daily campaign
    const cpk=r.campaign+'||'+r.date;
    if (!cpDMap[cpk]) cpDMap[cpk]={campaign:r.campaign,date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const cpm=cpDMap[cpk]; cpm.spent+=r.spent;cpm.imp+=r.imp;cpm.clicks+=r.clicks;cpm.revenue+=r.revenue;cpm.orders+=r.orders;
    // daily adset
    const adk=r.media+'||'+r.adset+'||'+r.date;
    if (!adMap[adk]) adMap[adk]={media:r.media,campaign:r.campaign,adset:r.adset,date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const adm=adMap[adk]; adm.spent+=r.spent;adm.imp+=r.imp;adm.clicks+=r.clicks;adm.revenue+=r.revenue;adm.orders+=r.orders;
    // ads
    const ask=r.media+'||'+r.adset+'||'+r.ads;
    if (!adsMap[ask]) adsMap[ask]={media:r.media,campaign:r.campaign,adset:r.adset,ads:r.ads,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const asm=adsMap[ask]; asm.spent+=r.spent;asm.imp+=r.imp;asm.clicks+=r.clicks;asm.revenue+=r.revenue;asm.orders+=r.orders;
  });
  // lookup tables
  const mediaToCampaigns={}, campaignToAdsets={};
  rows.forEach(r=>{
    if(!mediaToCampaigns[r.media]) mediaToCampaigns[r.media]=new Set();
    mediaToCampaigns[r.media].add(r.campaign);
    if(!campaignToAdsets[r.campaign]) campaignToAdsets[r.campaign]=new Set();
    campaignToAdsets[r.campaign].add(r.adset);
  });
  Object.keys(mediaToCampaigns).forEach(k=>mediaToCampaigns[k]=[...mediaToCampaigns[k]].sort());
  Object.keys(campaignToAdsets).forEach(k=>campaignToAdsets[k]=[...campaignToAdsets[k]].sort());

  return {
    mediaToCampaigns, campaignToAdsets,
    mediaRows:         agg(mMap),
    adsetRows:         agg(aMap),
    dailyRows:         agg(dMap).sort((a,b)=>a.date.localeCompare(b.date)),
    campaignDailyRows: agg(cpDMap).sort((a,b)=>a.date.localeCompare(b.date)),
    adsetDailyRows:    agg(adMap).sort((a,b)=>a.date.localeCompare(b.date)),
    adsRows:           agg(adsMap),
  };
}

function applyEventFilter() {
  const rows = state.event
    ? parsed._rawRows.filter(r => r.event === state.event)
    : parsed._rawRows;
  const agg = buildAggregates(rows);
  Object.assign(parsed, agg);
  // 날짜 범위 업데이트
  const dates = rows.map(r=>r.date).filter(Boolean).sort();
  _minD = dates[0]||''; _maxD = dates[dates.length-1]||'';
  if (!state.dateFrom || state.dateFrom < _minD || state.dateFrom > _maxD) state.dateFrom = _minD;
  if (!state.dateTo   || state.dateTo   < _minD || state.dateTo   > _maxD) state.dateTo   = _maxD;
  document.getElementById('dateFrom').value = state.dateFrom;
  document.getElementById('dateTo').value   = state.dateTo;
}

function parseRaw(data) {
  const rows = data.map(r => ({
    date:     (r['date']||'').trim(),
    media:    (r['media_source']||'').trim(),
    campaign: (r['campaign (캠페인명)']||'').trim(),
    adset:    (r['adset (그룹명)']||'').trim(),
    ads:      (r['ads (소재)']||'').trim(),
    spent:    parseNum(r['spent']),
    imp:      parseNum(r['imp']),
    clicks:   parseNum(r['clicks']),
    revenue:  parseNum(r['거래액']),
    orders:   parseNum(r['쇼핑 주문수(총)']),
    event:    (r['기획전명']||'').trim(),
  })).filter(r => r.date && /\d{4}-\d{2}-\d{2}/.test(r.date));

  const EVENT_ORDER = ['1차','2차','7/16 기획전','3차'];
  const allEvents = [...new Set(rows.map(r=>r.event).filter(Boolean))];
  const events = allEvents.sort((a,b) => {
    const ai = EVENT_ORDER.findIndex(o => a.includes(o) || o.includes(a));
    const bi = EVENT_ORDER.findIndex(o => b.includes(o) || o.includes(b));
    if (ai===-1 && bi===-1) return a.localeCompare(b);
    if (ai===-1) return 1;
    if (bi===-1) return -1;
    return ai - bi;
  });
  const agg = buildAggregates(rows);
  return { events, _rawRows: rows, ...agg };
}

// ── Load ─────────────────────────────────────────────────────
function loadData() {
  // 이미지 시트 먼저 로드 후 메인 데이터 로드
  Papa.parse(IMAGE_URL, {
    download:true, header:true, skipEmptyLines:true,
    complete:({data}) => {
      data.forEach(r => {
        const ads = (r['ads (소재)']||'').trim();
        const url = (r['이미지 URL']||'').trim();
        if (ads && url) imageMap[ads] = { thumb: toDriveImg(url,'w120'), large: toDriveImg(url,'w800') };
      });
      Papa.parse(CSV_URL, {
        download:true, header:true, skipEmptyLines:true,
        complete:({data}) => { parsed=parseRaw(data); initUI(); applyEventFilter(); render(); },
        error:err => { document.getElementById('content').innerHTML=`<div class="state-box">⚠️ 오류: ${err.message}</div>`; }
      });
    },
    error:() => {
      // 이미지 로드 실패해도 메인 데이터는 표시
      Papa.parse(CSV_URL, {
        download:true, header:true, skipEmptyLines:true,
        complete:({data}) => { parsed=parseRaw(data); initUI(); applyEventFilter(); render(); },
        error:err => { document.getElementById('content').innerHTML=`<div class="state-box">⚠️ 오류: ${err.message}</div>`; }
      });
    }
  });
}

  _minD=allDates[0]||''; _maxD=allDates[allDates.length-1]||'';
  state.dateFrom=_minD; state.dateTo=_maxD;
  document.getElementById('dateFrom').value=_minD;
  document.getElementById('dateTo').value=_maxD;

  document.querySelectorAll('.media-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.media=btn.dataset.media; state.quick=null;
      document.querySelectorAll('.media-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); render();
    });
  });

  // 주차 드롭다운 빌드
  buildWeekOptions();

  document.getElementById('dateFrom').addEventListener('change',e=>{state.dateFrom=e.target.value;state.quick=null;clearQuick();document.getElementById('weekSel').value='';updateCmpLabel();});
  document.getElementById('dateTo').addEventListener('change',e=>{state.dateTo=e.target.value;state.quick=null;clearQuick();document.getElementById('weekSel').value='';updateCmpLabel();});
  document.getElementById('applyDate').addEventListener('click',()=>{render();});

  document.getElementById('weekSel').addEventListener('change', e=>{
    const val = e.target.value;
    if (!val) return;
    const [from, to] = val.split('|');
    state.quick=null; clearQuick();
    setDates(from, to);
    updateCmpLabel();
    render();
  });

  document.querySelectorAll('.quick-btn[data-quick]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const q=btn.dataset.quick;
      state.quick=q; clearQuick(); btn.classList.add('active');
      const d=new Date(_maxD);
      if      (q==='yesterday'){ d.setDate(d.getDate()-1); const s=d.toISOString().slice(0,10); setDates(s,s); }
      else if (q==='7days')  { d.setDate(d.getDate()-6);  setDates(d.toISOString().slice(0,10),_maxD); }
      else if (q==='14days') { d.setDate(d.getDate()-13); setDates(d.toISOString().slice(0,10),_maxD); }
      else if (q==='30days') { d.setDate(d.getDate()-29); setDates(d.toISOString().slice(0,10),_maxD); }
      document.getElementById('weekSel').value='';
      updateCmpLabel();
      render();
    });
  });

  // 비교 토글
  document.getElementById('compareToggle').addEventListener('click', ()=>{
    state.cmpMode = !state.cmpMode;
    document.getElementById('compareToggle').classList.toggle('active', state.cmpMode);
    document.getElementById('compareArea').style.display = state.cmpMode ? 'flex' : 'none';
    if (state.cmpMode) updateCmpLabel();
  });

  document.querySelectorAll('.cmp-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.cmp-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.cmpAuto = btn.dataset.cmp === 'auto';
      document.getElementById('cmpManual').style.display = state.cmpAuto ? 'none' : 'flex';
      updateCmpLabel();
    });
  });

  document.getElementById('cmpFrom').addEventListener('change', e=>{ state.cmpFrom=e.target.value; updateCmpLabel(); });
  document.getElementById('cmpTo').addEventListener('change',   e=>{ state.cmpTo=e.target.value;   updateCmpLabel(); });
}

function buildWeekOptions() {
  const sel = document.getElementById('weekSel');
  const dates = [...new Set(parsed.dailyRows.map(r=>r.date))].sort();
  if (!dates.length) return;

  // 날짜별로 월요일 기준 주 묶기
  const weekMap = {};
  dates.forEach(d => {
    const dt = new Date(d);
    const dow = (dt.getDay() + 6) % 7; // 월=0
    const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
    const key = mon.toISOString().slice(0,10);
    if (!weekMap[key]) weekMap[key] = { min: d, max: d };
    if (d < weekMap[key].min) weekMap[key].min = d;
    if (d > weekMap[key].max) weekMap[key].max = d;
  });

  // ISO 주차 번호 계산
  const getISOWeek = d => {
    const dt = new Date(d);
    dt.setHours(0,0,0,0);
    dt.setDate(dt.getDate() + 3 - (dt.getDay() + 6) % 7);
    const week1 = new Date(dt.getFullYear(), 0, 4);
    return 1 + Math.round(((dt - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  };

  const fmtD = s => s.replace(/-/g,'.'); // 2026-05-01 → 2026.05.01
  const entries = Object.entries(weekMap).sort((a,b)=>b[0].localeCompare(a[0])); // 최신순
  sel.innerHTML = '<option value="">주차 선택</option>' +
    entries.map(([mon, {min, max}]) => {
      const wn = getISOWeek(mon);
      const label = `${wn}주차 (${fmtD(min)}~${fmtD(max)})`;
      return `<option value="${min}|${max}">${label}</option>`;
    }).join('');
}

function updateCmpLabel() {
  if (!state.cmpMode) return;
  const label = document.getElementById('cmpLabel');
  const manual = document.getElementById('cmpManual');

  if (state.cmpAuto) {
    manual.style.display = 'none';
    const from = new Date(state.dateFrom), to = new Date(state.dateTo);
    const days = Math.round((to - from) / 86400000) + 1;
    const cTo = new Date(from); cTo.setDate(cTo.getDate() - 1);
    const cFrom = new Date(cTo); cFrom.setDate(cFrom.getDate() - days + 1);
    state.cmpFrom = cFrom.toISOString().slice(0,10);
    state.cmpTo   = cTo.toISOString().slice(0,10);
    label.textContent = `vs ${state.cmpFrom.replace(/-/g,'.')}~${state.cmpTo.replace(/-/g,'.')}`;
  } else {
    manual.style.display = 'flex';
    if (state.cmpFrom && state.cmpTo)
      label.textContent = `vs ${state.cmpFrom.replace(/-/g,'.')}~${state.cmpTo.replace(/-/g,'.')}`;
    else
      label.textContent = '비교 기간 선택';
  }
}

function clearQuick() { document.querySelectorAll('.quick-btn[data-quick]').forEach(b=>b.classList.remove('active')); }
function setDates(from,to) {
  state.dateFrom=from; state.dateTo=to;
  document.getElementById('dateFrom').value=from;
  document.getElementById('dateTo').value=to;
}

// ── Filtered helpers ─────────────────────────────────────────
function filterMedia(r) {
  if (state.media==='meta'   && !isFb(r.media))     return false;
  if (state.media==='kakao'  && !isKakao(r.media))  return false;
  if (state.media==='tiktok' && !isTiktok(r.media)) return false;
  return true;
}
function filterDate(r) {
  if (state.dateFrom && r.date < state.dateFrom) return false;
  if (state.dateTo   && r.date > state.dateTo)   return false;
  return true;
}

// ── Comp data ─────────────────────────────────────────────────
function getCompData() {
  if (state.media==='all') {
    const rows=view.mediaRows;
    return { type:'media', rows, labels:rows.map(r=>r.media), spent:rows.map(r=>r.spent), revenue:rows.map(r=>r.revenue), clicks:rows.map(r=>r.clicks), ctr:rows.map(r=>r.ctr), imp:rows.map(r=>r.imp), cpc:rows.map(r=>r.cpc), roas:rows.map(r=>r.roas), orders:rows.map(r=>r.orders), colors:rows.map(r=>colorOf(r.media)) };
  }
  const rows=view.adsetRows.filter(filterMedia);
  return { type:'adset', rows, labels:rows.map(r=>r.adset), spent:rows.map(r=>r.spent), revenue:rows.map(r=>r.revenue), clicks:rows.map(r=>r.clicks), ctr:rows.map(r=>r.ctr), imp:rows.map(r=>r.imp), cpc:rows.map(r=>r.cpc), roas:rows.map(r=>r.roas), orders:rows.map(r=>r.orders), colors:rows.map((_,i)=>pc(i)) };
}

// ── Render ────────────────────────────────────────────────────
function render() {
  if (!parsed) return;
  // 날짜 필터 적용한 집계 재생성
  view = buildAggregates(parsed._rawRows.filter(filterDate));
  const comp  = getCompData();
  const dRows = view.dailyRows.filter(filterMedia);
  const dailyMedias = [...new Set(dRows.map(r=>r.media))];

  const total={spent:0,revenue:0,imp:0,clicks:0,orders:0};
  dRows.forEach(r=>{total.spent+=r.spent;total.revenue+=r.revenue;total.imp+=r.imp;total.clicks+=r.clicks;total.orders+=r.orders||0;});
  total.ctr  = total.imp>0    ? total.clicks/total.imp*100    : 0;
  total.roas = total.spent>0  ? total.revenue/total.spent*100 : 0;
  total.cpc  = total.clicks>0 ? total.spent/total.clicks      : 0;

  const dateStr = state.dateFrom===state.dateTo ? state.dateFrom : `${state.dateFrom} ~ ${state.dateTo}`;
  const isMediaTab = state.media !== 'all';

  // 매체 탭일 때 그룹 드롭다운 준비
  const currentMediaName = isMediaTab
    ? (view.mediaRows.find(r => state.media==='meta' ? isFb(r.media) : state.media==='kakao' ? isKakao(r.media) : isTiktok(r.media))?.media || '')
    : '';
  const mediaAdsets = currentMediaName
    ? [...new Set(view.adsetRows.filter(r=>r.media===currentMediaName).map(r=>r.adset))].sort()
    : [];
  const selAdset = state.adsetFilter[currentMediaName] || '';
  const adsetDropdown = isMediaTab && mediaAdsets.length > 1
    ? `<select class="custom-select" id="secAdsetSel" style="min-width:150px">
        <option value="">전체 그룹</option>
        ${mediaAdsets.map(a=>`<option value="${a}" ${a===selAdset?'selected':''}>${a}</option>`).join('')}
       </select>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="info-strip">
      <div class="info-chip">📌 기획전: <strong>${state.event||'-'}</strong></div>
      <div class="info-chip">📅 기간: <strong>${dateStr||'-'}</strong></div>
    </div>

    ${state.media==='all' ? `<div class="ai-card">
      <div class="ai-card-header">
        <span class="ai-badge">AI 요약</span>
        <span class="ai-period">${dateStr} 기준 성과 분석</span>
      </div>
      <div class="ai-grid" id="aiSummary"><div style="color:var(--text3);font-size:12px">분석 중…</div></div>
    </div>` : ''}

    <div>
      <div class="sec-title">전체 요약</div>
      <div class="kpi-grid" id="kpiGrid"></div>
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div class="sec-title" style="margin-bottom:0">${isMediaTab ? '그룹별 누적 성과 비중' : '매체별 누적 성과 비중'}</div>
        ${adsetDropdown}
      </div>
      <div class="three-col">
        <div class="card"><div class="chart-label">💰 비용 지출 비중</div><div class="chart-sm"><canvas id="cSpent"></canvas></div></div>
        <div class="card"><div class="chart-label">🛒 거래액 비중</div><div class="chart-sm"><canvas id="cRevenue"></canvas></div></div>
        <div class="card"><div class="chart-label">👆 클릭수 / CTR 비교</div><div class="chart-sm"><canvas id="cCTR"></canvas></div></div>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="sub-sec-title"><span>${isMediaTab ? '그룹별 성과' : '매체별 성과'}</span></div>
        <div class="tbl-wrap" id="compTable"></div>
      </div>
    </div>

    <div id="dailySections"></div>
  `;

  renderKPI(total);
  renderDonut('cSpent',   comp.labels, comp.spent,   comp.colors);
  renderDonut('cRevenue', comp.labels, comp.revenue, comp.colors);
  renderCTRChart(comp);
  renderCompTable(comp, total);
  // 그룹 드롭박스 이벤트
  document.getElementById('secAdsetSel')?.addEventListener('change', e => {
    state.adsetFilter[currentMediaName] = e.target.value;
    render();
  });

  if (state.media === 'all') {
    const el = document.getElementById('aiSummary');
    if (el) el.innerHTML = generateAISummary(dRows);
    renderUnifiedDailySection();
  } else {
    renderDailySections(dailyMedias, dRows);
  }
}

// ── Charts ────────────────────────────────────────────────────
function dc(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

function renderDonut(id, labels, values, colors) {
  dc(id);
  const total=values.reduce((s,v)=>s+v,0);
  const ctx=document.getElementById(id)?.getContext('2d'); if(!ctx)return;
  const many=labels.length>4;
  const sl=labels.map(l=>l.length>18?l.slice(0,17)+'…':l);
  charts[id]=new Chart(ctx,{
    type:'doughnut',
    data:{labels:sl,datasets:[{data:values,backgroundColor:colors.map(c=>c.bg),borderColor:colors.map(c=>c.border),borderWidth:2,hoverOffset:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{
        legend:{position:'bottom',labels:{font:{size:many?9:11},padding:many?6:12,color:'#94a3b8',boxWidth:10}},
        tooltip:{callbacks:{label:c=>{const p=total>0?(c.raw/total*100).toFixed(1):0;return ` ${c.label}: ${fmt.won(c.raw)} (${p}%)`;}}}
      }
    }
  });
}

function renderCTRChart(comp) {
  dc('cCTR');
  const ctx=document.getElementById('cCTR')?.getContext('2d'); if(!ctx)return;
  const many=comp.labels.length>4;
  const sl=comp.labels.map(l=>l.length>16?l.slice(0,15)+'…':l);
  charts['cCTR']=new Chart(ctx,{
    data:{labels:sl,datasets:[
      {type:'bar',  label:'클릭수',data:comp.clicks,backgroundColor:comp.colors.map(c=>c.bg),borderColor:comp.colors.map(c=>c.border),borderWidth:1,borderRadius:4,yAxisID:'yL'},
      {type:'line', label:'CTR (%)',data:comp.ctr,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',borderWidth:2,pointRadius:many?3:6,pointBackgroundColor:'#22c55e',yAxisID:'yR',tension:0.3,fill:false}
    ]},

// ── Comparison table ──────────────────────────────────────────
function renderCompTable(comp, total) {
  const isAdset=comp.type==='adset';
  const firstTh=isAdset?'그룹명':'매체';
  const tS=comp.spent.reduce((s,v)=>s+v,0), tR=comp.revenue.reduce((s,v)=>s+v,0);
  const tbody=comp.rows.map((r,i)=>{
    const sp=tS>0?(r.spent/tS*100).toFixed(1):0;
    const rp=tR>0?(r.revenue/tR*100).toFixed(1):0;
    const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${comp.colors[i].border};margin-right:6px;flex-shrink:0"></span>`;
    const name=isAdset?r.adset:r.media;
    return `<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dot}${name}</td><td>${fmt.won(r.spent)} <small style="color:var(--text3)">(${sp}%)</small></td><td>${fmt.won(r.revenue)} <small style="color:var(--text3)">(${rp}%)</small></td><td>${fmt.roas(r.roas)}</td><td>${fmt.num(r.imp)}</td><td>${fmt.num(r.clicks)}</td><td>${fmt.pct(r.ctr)}</td><td>${fmt.won(r.cpc)}</td><td>${fmt.num(r.orders)}</td></tr>`;
  }).join('');
  const ctr=total.imp>0?total.clicks/total.imp*100:0, cpc=total.clicks>0?total.spent/total.clicks:0;
  document.getElementById('compTable').innerHTML=`
    <table>
      <thead><tr><th>${firstTh}</th><th>광고비</th><th>거래액</th><th>ROAS</th><th>노출수</th><th>클릭수</th><th>CTR</th><th>CPC</th><th>주문수</th></tr></thead>
      <tbody>${tbody}<tr class="tbl-total"><td>합계</td><td>${fmt.won(total.spent)}</td><td>${fmt.won(total.revenue)}</td><td>${fmt.roas(total.roas)}</td><td>${fmt.num(total.imp)}</td><td>${fmt.num(total.clicks)}</td><td>${fmt.pct(ctr)}</td><td>${fmt.won(cpc)}</td><td>${fmt.num(total.orders)}</td></tr></tbody>
    </table>`;
}

function buildUnifiedDailyCharts() {
  let rows;
  if (state.odAdset) {
    rows = parsed.adsetDailyRows.filter(r=>r.adset===state.odAdset&&filterDate(r)).sort((a,b)=>a.date.localeCompare(b.date));
  } else if (state.odCampaign) {
    rows = parsed.campaignDailyRows.filter(r=>r.campaign===state.odCampaign&&filterDate(r)).sort((a,b)=>a.date.localeCompare(b.date));
  } else if (state.odMedia) {
    rows = parsed.dailyRows.filter(r=>r.media===state.odMedia&&filterDate(r)).sort((a,b)=>a.date.localeCompare(b.date));
  } else {
    const m={};
    parsed.dailyRows.filter(filterDate).forEach(r=>{
      if(!m[r.date]) m[r.date]={date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
      const d=m[r.date]; d.spent+=r.spent;d.imp+=r.imp;d.clicks+=r.clicks;d.revenue+=r.revenue;d.orders+=r.orders||0;
    });
    rows = Object.values(m).map(r=>addMetrics({...r})).sort((a,b)=>a.date.localeCompare(b.date));
  }

  let c = {bg:'rgba(99,102,241,.8)',border:'#6366f1',light:'rgba(99,102,241,.15)'};
  if (state.odMedia) c = colorOf(state.odMedia);

  const dates = rows.map(r=>r.date);

  dc('cIC_u');
  const ctx1=document.getElementById('cIC_u')?.getContext('2d');
  if(ctx1) charts['cIC_u']=new Chart(ctx1,{
    data:{labels:dates,datasets:[
      {type:'bar',label:'노출수',data:rows.map(r=>r.imp),backgroundColor:c.light||c.bg,borderColor:c.border,borderWidth:1,borderRadius:3,yAxisID:'yL'},
      {type:'line',label:'클릭수',data:rows.map(r=>r.clicks),borderColor:'#22c55e',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#22c55e',yAxisID:'yR',tension:0.3}

  const ctx2=document.getElementById('cCPC_u')?.getContext('2d');
  if(ctx2) charts['cCPC_u']=new Chart(ctx2,{
    type:'line',
    data:{labels:dates,datasets:[{label:'CPC',data:rows.map(r=>r.cpc),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.1)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#f97316',tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' CPC: '+fmt.won(c.raw)}}},scales:{y:{ticks:{callback:v=>'₩'+(v>=1000?(v/1000).toFixed(0)+'K':v),font:{size:10}},grid:{color:'#263347'}},x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:10},maxRotation:45,maxTicksLimit:8}}}}
  });

  dc('cRev_u');
  const ctx3=document.getElementById('cRev_u')?.getContext('2d');
  if(ctx3) charts['cRev_u']=new Chart(ctx3,{
    data:{labels:dates,datasets:[
      {type:'bar',label:'거래액',data:rows.map(r=>r.revenue),backgroundColor:c.bg,borderColor:c.border,borderWidth:0,borderRadius:3,yAxisID:'yL'},
      {type:'line',label:'ROAS',data:rows.map(r=>r.roas),borderColor:'#a78bfa',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#a78bfa',yAxisID:'yR',tension:0.3}
    ]},options:dualOpts(v=>'₩'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v),v=>Math.round(v)+'%','거래액','ROAS')
  });

  // 일별 테이블
  const sub={spent:0,imp:0,clicks:0,revenue:0,orders:0};
  rows.forEach(r=>{sub.spent+=r.spent;sub.imp+=r.imp;sub.clicks+=r.clicks;sub.revenue+=r.revenue;sub.orders+=r.orders||0;});

      {type:'bar',label:'거래액',data:rows.map(r=>r.revenue),backgroundColor:c.bg,borderColor:c.border,borderWidth:0,borderRadius:3,yAxisID:'yL'},

    ]},options:dualOpts(v=>'₩'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v),v=>Math.round(v)+'%','거래액','ROAS')
  });

  // Daily table
  const sub={spent:0,imp:0,clicks:0,revenue:0,orders:0};

          const avg = groupAvgs[r.adset] || {};

          // 저조 판단: CTR 낮음 / CPC 높음 / ROAS 낮음
          const lowCtr  = avg.ctr  > 0 && r.ctr  < avg.ctr;
          const highCpc = avg.cpc  > 0 && r.cpc  > avg.cpc;
          const lowRoas = avg.roas > 0 && r.roas < avg.roas;
          const badCount = [lowCtr, highCpc, lowRoas].filter(Boolean).length;

          const rowCls = isGroupEnd
            ? ` class="group-end${badCount===3?' row-bad':badCount===2?' row-warn':''}"`
            : badCount===3 ? ` class="row-bad"` : badCount===2 ? ` class="row-warn"` : '';

          const badge = badCount===3
            ? `<span class="badge-stop">교체 검토</span>`
            : badCount===2 ? `<span class="badge-warn">주의</span>` : '';

          const imgCls = `creative-img${kakaoMedia?' kakao-bg':''}`;
          const imgTag = img
            ? `<img class="${imgCls}" src="${img.thumb}" data-large="${img.large}" data-kakao="${kakaoMedia?'1':'0'}" onmouseenter="showImgHover(this,event)" onmousemove="moveImgHover(event)" onmouseleave="hideImgHover()" onclick="openImgModal('${img.thumb}','${img.large}','${(r.ads||'').replace(/'/g,"\\'")}');event.stopPropagation()" onerror="this.style.display='none'" />`
            : '';
          const nameSpan = img
            ? `<span class="creative-name-link" onclick="openImgModal('${img.thumb}','${img.large}','${(r.ads||'').replace(/'/g,"\\'")}')">` + (r.ads||'-') + `</span>`
            : `<span>${r.ads||'-'}</span>`;

          return `<tr${rowCls}>
            <td ${tdS}>${r.campaign||'-'}</td>
            <td ${tdS}>${r.adset||'-'}</td>
            <td style="text-align:left;white-space:nowrap">
              <div style="display:flex;align-items:center;gap:8px">
                ${imgTag}${nameSpan}${badge}
              </div>
            </td>
            <td>${fmt.won(r.spent)}</td>
            <td>${fmt.num(r.imp)}</td>
            <td>${fmt.num(r.clicks)}</td>
            <td><span${lowCtr?' class="metric-bad"':''}>${fmt.pct(r.ctr)}</span></td>
            <td><span${highCpc?' class="metric-bad"':''}>${fmt.won(r.cpc)}</span></td>
            <td>${fmt.won(r.revenue)}</td>
            <td><span${lowRoas?' class="metric-bad"':''}>${fmt.roas(r.roas)}</span></td>
          </tr>`;
        }).join('')}
        <tr class="tbl-total"><td>합계</td><td>-</td><td>-</td><td>${fmt.won(aSub.spent)}</td><td>${fmt.num(aSub.imp)}</td><td>${fmt.num(aSub.clicks)}</td><td>${fmt.pct(aCtr)}</td><td>${fmt.won(aCpc)}</td><td>${fmt.won(aSub.revenue)}</td><td>${fmt.roas(aRoas)}</td></tr>
      </tbody>
    </table>
    <div class="tbl-legend">
      <span><span class="badge-stop">교체 검토</span> CTR·CPC·ROAS 3개 지표 모두 그룹 평균 이하</span>
      <span><span class="badge-warn">주의</span> 3개 중 2개 지표 그룹 평균 이하</span>
      <span style="color:#f87171">■</span> 개별 지표 그룹 평균 이하
    </div>`;
}

// ── AI Summary ───────────────────────────────────────────────
function n(v) { return `<span class="ai-num">${v}</span>`; }

function generateAISummary(dRows) {
  if (!parsed || !dRows.length) return '<div style="color:var(--text3);font-size:12px">해당 기간 데이터가 없습니다.</div>';

  const n = s => `<strong>${s}</strong>`;
  const medias = [...new Set(dRows.map(r=>r.media))]
    .sort((a,b) => isFb(a) ? -1 : isFb(b) ? 1 : isKakao(a) ? -1 : isKakao(b) ? 1 : 0);
  let html = '';

  for (const media of medias) {
    const adsRows   = view.adsRows.filter(r=>r.media===media);
    const adsetAgg  = view.adsetRows.filter(r=>r.media===media);
    const label     = isFb(media) ? '인스타그램' : isTiktok(media) ? 'TikTok' : media;

    const adsetMap = {};
    adsRows.forEach(r => { if (!adsetMap[r.adset]) adsetMap[r.adset]=[]; adsetMap[r.adset].push(r); });

    let adsetBlocks = '';

    for (const [adset, creatives] of Object.entries(adsetMap)) {
      const valid = creatives.filter(r => r.imp > 0 || r.clicks > 0 || r.spent > 0);
      if (!valid.length) continue;

      // 그룹 집계 (adsetRows 기반, 없으면 소재 합산)
      const agg = adsetAgg.find(r=>r.adset===adset);
      const grpCtr = agg?.ctr  ?? (valid.reduce((s,r)=>s+r.imp,0)>0 ? valid.reduce((s,r)=>s+r.clicks,0)/valid.reduce((s,r)=>s+r.imp,0)*100 : 0);
      const grpCpc = agg?.cpc  ?? (valid.reduce((s,r)=>s+r.clicks,0)>0 ? valid.reduce((s,r)=>s+r.spent,0)/valid.reduce((s,r)=>s+r.clicks,0) : 0);

      // 소재별 판정 기준 (소재 테이블과 동일)
      const avgCtr  = valid.reduce((s,r)=>s+r.ctr, 0)  / valid.length;
      const avgCpc  = valid.reduce((s,r)=>s+r.cpc, 0)  / valid.length;
      const avgRoas = valid.reduce((s,r)=>s+r.roas, 0) / valid.length;

      const getBadCount = r => {
        const lowCtr  = avgCtr  > 0 && r.ctr  < avgCtr;
        const highCpc = avgCpc  > 0 && r.cpc  > avgCpc;
        const lowRoas = avgRoas > 0 && r.roas < avgRoas;
        return [lowCtr, highCpc, lowRoas].filter(Boolean).length;
      };

      // 원인 추론 함수
      const inferCause = (cr) => {
        const lowCtr  = avgCtr  > 0 && cr.ctr  < avgCtr;
        const highCpc = avgCpc  > 0 && cr.cpc  > avgCpc;
        const lowRoas = avgRoas > 0 && cr.roas < avgRoas;

        // 노출 충분한데 CTR 매우 낮음 → 소재 어필 문제
        if (cr.imp > 500 && lowCtr && cr.ctr < avgCtr * 0.6) {
          return '노출 대비 클릭 반응 저조 — 소재 비주얼/카피 어필 부족으로 추정';
        }
        // CTR은 나쁘지 않은데 ROAS만 낮음 → 랜딩/타겟 문제
        if (!lowCtr && lowRoas && cr.clicks >= 5) {
          return '클릭 유입 대비 전환 미발생 — 랜딩 연결 또는 타겟 미스매치 추정';
        }
        // CPC가 평균의 1.5배 이상 → 경쟁/품질지수 문제
        if (highCpc && avgCpc > 0 && cr.cpc > avgCpc * 1.5) {
          return `CPC ${fmt.won(cr.cpc)} (그룹 평균 ${fmt.won(avgCpc)} 대비 ${Math.round(cr.cpc/avgCpc*100-100)}% 초과) — 경쟁 심화 또는 소재 품질지수 저하 추정`;
        }
        // 노출 자체가 매우 적음 → 게재 이슈
        if (cr.imp < 100 && cr.spent > 0) {
          return '게재량 저조 — 소재 심사 이슈 또는 예산 배분 집중 부족 추정';
        }
        // CTR 낮고 CPC도 높음 → 소재 피로도
        if (lowCtr && highCpc) {
          return 'CTR 저조 + CPC 상승 동반 — 소재 피로도 또는 타겟 소진 추정';
        }
        // 전 지표 동반 저조 → 종합 부진
        return '전 지표 동반 저조 — 소재 전반 효율 점검 필요';
      };

      const noClick    = valid.filter(r => r.clicks === 0);
      const topCrs     = valid.filter(r => r.clicks > 0 && getBadCount(r) === 0 && r.ctr >= avgCtr * 1.1).sort((a,b)=>b.ctr-a.ctr);
      const replaceCrs = valid.filter(r => r.clicks > 0 && getBadCount(r) === 3);
      const warnCrs    = valid.filter(r => r.clicks > 0 && getBadCount(r) === 2);

      const paras = [];

      // ① 우수 소재
      if (topCrs.length > 0) {
        const best = topCrs[0];
        if (topCrs.length === 1) {
          paras.push(`<p class="good">${n(best.ads||'-')} 소재가 CTR ${fmt.pct(best.ctr)}, CPC ${fmt.won(best.cpc)}으로 그룹 효율 견인</p>`);
        } else {
          paras.push(`<p class="good">${topCrs.slice(0,2).map(r=>n(r.ads||'-')).join(', ')} 소재가 각각 CTR ${fmt.pct(topCrs[0].ctr)}, ${fmt.pct(topCrs[1].ctr)}으로 그룹 효율 견인</p>`);
        }
      }

      // ② 클릭 미발생
      if (noClick.length > 0) {
        const names = noClick.map(r=>n(r.ads||'-')).join(', ');
        paras.push(`<p>${names} 소재 클릭 미발생</p>`);
      }

      // ③ 교체 검토 소재 — 같은 원인끼리 묶어 표시
      const replaceByCause = {};
      replaceCrs.forEach(cr => {
        const cause = inferCause(cr);
        if (!replaceByCause[cause]) replaceByCause[cause] = [];
        replaceByCause[cause].push(cr);
      });
      Object.entries(replaceByCause).forEach(([cause, crs]) => {
        const names = crs.map(r=>n(r.ads||'-')).join(', ');
        paras.push(`<p class="action-stop">→ ${names}: 지속 저성과 (${cause}) — OFF 후 신규 소재 투입 제안</p>`);
      });

      // ④ 주의 소재 — 같은 원인끼리 묶어 표시
      const warnByCause = {};
      warnCrs.forEach(cr => {
        const cause = inferCause(cr);
        if (!warnByCause[cause]) warnByCause[cause] = [];
        warnByCause[cause].push(cr);
      });
      Object.entries(warnByCause).forEach(([cause, crs]) => {
        const names = crs.map(r=>n(r.ads||'-')).join(', ');
        paras.push(`<p class="action">→ ${names}: 그룹 평균 대비 저조 (${cause}) — 추가 모니터링 예정</p>`);
      });

      // 소재가 1개뿐이고 특이사항 없는 경우
      if (!paras.length) {
        const cr = valid[0];
        paras.push(`<p>${n(cr.ads||'-')} 단일 소재 운영 중 — CTR ${fmt.pct(cr.ctr)}, CPC ${fmt.won(cr.cpc)}, ROAS ${fmt.roas(cr.roas)}</p>`);
      }

      adsetBlocks += `<div class="ai-adset-block">
        <div class="ai-adset-header">* ${adset} &nbsp; CTR ${fmt.pct(grpCtr)}, CPC ${fmt.won(grpCpc)}</div>
        <div class="ai-adset-body">${paras.join('')}</div>
      </div>`;
    }

    if (!adsetBlocks) continue;

    html += `<div class="ai-block">
      <div class="ai-media-label">[${label}]</div>
      ${adsetBlocks}
    </div>`;
  }

  return html || '<div style="color:var(--text3);font-size:12px">분석 데이터 없음</div>';
}

// ── Bubble chart ─────────────────────────────────────────────
function getCategory(ads) {
  const n=(ads||'').toLowerCase();
  if (n.includes('athleisure')) return '애슬레저';
  if (n.includes('underwear'))  return '언더웨어';
  if (n.includes('biz'))        return '비즈보드';
  if (n.includes('sport'))      return '스포츠';
  if (n.includes('outer'))      return '아우터';
  // 소재명 두번째 파트로 분류
  const parts = n.split('_').filter(Boolean);
  return parts.length > 1 ? parts[1] : '기타';
}

const BUBBLE_COLORS = ['#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#a78bfa','#f97316','#ec4899'];

function renderBubbleChart(idx, adsRows, media) {
  const el = document.getElementById(`bubble_${idx}`);
  if (!el || !adsRows.length) return;

  const rows = adsRows.filter(r => r.roas > 0 || r.revenue > 0);
  if (!rows.length) { el.innerHTML = '<div style="color:#4e6176;text-align:center;padding:60px">데이터 없음</div>'; return; }

  const cvr  = r => r.clicks > 0 ? (r.orders||0)/r.clicks*100 : 0;
  const cats  = [...new Set(rows.map(r => getCategory(r.ads)))];

  const avgRoas = rows.reduce((s,r)=>s+r.roas,0)/rows.length;
  const avgRev  = rows.reduce((s,r)=>s+r.revenue,0)/rows.length;
  const maxSpent = Math.max(...rows.map(r=>r.spent), 1);

  const traces = cats.map((cat, ci) => {
    const cr = rows.filter(r => getCategory(r.ads) === cat);
    return {
      type: 'scatter', mode: 'markers', name: cat,
      x: cr.map(r => +r.roas.toFixed(1)),
      y: cr.map(r => r.revenue),
      text: cr.map(r => r.ads),
      customdata: cr.map(r => [
        r.ads,
        fmt.won(r.spent), fmt.won(r.revenue),
        fmt.num(r.orders||0), fmt.roas(r.roas),
        fmt.pct(r.ctr), fmt.pct(cvr(r)), fmt.won(r.cpc)
      ]),
      hovertemplate:
        '<b>%{customdata[0]}</b><br>' +
        '광고비: %{customdata[1]}<br>' +
        '매출: %{customdata[2]}<br>' +
        '구매수: %{customdata[3]}<br>' +
        'ROAS: %{customdata[4]}<br>' +
        'CTR: %{customdata[5]}<br>' +
        'CVR: %{customdata[6]}<br>' +
        'CPC: %{customdata[7]}' +
        '<extra></extra>',
      marker: {
        size: cr.map(r => Math.max(12, Math.sqrt(r.spent/maxSpent)*80)),
        sizemode: 'diameter',
        color: BUBBLE_COLORS[ci % BUBBLE_COLORS.length],
        opacity: 0.75,
        line: { width: 1.5, color: 'rgba(255,255,255,.3)' }
      }
    };
  });

  // 사분면 라벨
  const quadLabels = [
    { x:1, y:1, xref:'paper', yref:'paper', text:'🔺 증액 후보<br><span style="font-size:10px">고효율·고매출</span>', showarrow:false, font:{size:11,color:'#22c55e'}, xanchor:'right', yanchor:'top' },
    { x:0, y:1, xref:'paper', yref:'paper', text:'🔧 소재 개선 후보<br><span style="font-size:10px">저효율·고매출</span>', showarrow:false, font:{size:11,color:'#f59e0b'}, xanchor:'left', yanchor:'top' },
    { x:1, y:0, xref:'paper', yref:'paper', text:'🧪 테스트 확대 후보<br><span style="font-size:10px">고효율·저매출</span>', showarrow:false, font:{size:11,color:'#6366f1'}, xanchor:'right', yanchor:'bottom' },
    { x:0, y:0, xref:'paper', yref:'paper', text:'🛑 중단 후보<br><span style="font-size:10px">저효율·저매출</span>', showarrow:false, font:{size:11,color:'#ef4444'}, xanchor:'left', yanchor:'bottom' },
  ];

  const layout = {
    paper_bgcolor:'#1a2436', plot_bgcolor:'#1a2436',
    font:{ family:'Segoe UI, Apple SD Gothic Neo, sans-serif', color:'#94a3b8', size:11 },
    margin:{ t:30, r:20, b:60, l:80 },
    xaxis:{
      title:{ text:'ROAS (%)', font:{color:'#94a3b8',size:12} },
      gridcolor:'#263347', zeroline:false, tickfont:{color:'#94a3b8'},
      ticksuffix:'%'
    },
    yaxis:{
      title:{ text:'거래액 (₩)', font:{color:'#94a3b8',size:12} },
      gridcolor:'#263347', zeroline:false, tickfont:{color:'#94a3b8'},
      tickformat:',.0f'
    },
    legend:{ bgcolor:'rgba(26,36,54,.8)', bordercolor:'#263347', borderwidth:1, font:{color:'#94a3b8'} },
    shapes:[
      // 평균 ROAS 기준선
      { type:'line', x0:avgRoas, x1:avgRoas, y0:0, y1:1, yref:'paper',
        line:{ color:'rgba(148,163,184,.4)', dash:'dot', width:1.5 } },
      // 평균 매출 기준선
      { type:'line', x0:0, x1:1, xref:'paper', y0:avgRev, y1:avgRev,
        line:{ color:'rgba(148,163,184,.4)', dash:'dot', width:1.5 } },
    ],
    annotations:[
      ...quadLabels,
      // 기준선 라벨
      { x:avgRoas, y:1, yref:'paper', text:`평균 ROAS ${Math.round(avgRoas)}%`, showarrow:false,
        font:{size:10,color:'#64748b'}, xanchor:'left', yanchor:'top', xshift:4 },
      { x:1, xref:'paper', y:avgRev, text:`평균 매출 ${fmt.won(avgRev)}`, showarrow:false,
        font:{size:10,color:'#64748b'}, xanchor:'right', yanchor:'bottom', yshift:4 },
    ],
    hoverlabel:{ bgcolor:'#1e293b', bordercolor:'#6366f1', font:{color:'#f1f5f9',size:12} },
  };

  Plotly.newPlot(`bubble_${idx}`, traces, layout, {
    responsive:true, displayModeBar:false
  });
}

function dualOpts(fmtL,fmtR,labelL,labelR) {
  return {
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,color:'#94a3b8',boxWidth:10}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='yR'?` ${c.dataset.label}: ${fmtR(c.raw)}`:` ${c.dataset.label}: ${fmtL(c.raw)}`}}},
    scales:{
      yL:{type:'linear',position:'left',ticks:{callback:fmtL,font:{size:9}},grid:{color:'#263347'},title:{display:true,text:labelL,font:{size:9},color:'#64748b'}},
      yR:{type:'linear',position:'right',ticks:{callback:fmtR,font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:labelR,font:{size:9},color:'#64748b'}},
      x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9},maxRotation:45,maxTicksLimit:8}}
    }
  };
}

loadData();
