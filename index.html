<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>광고 성과 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:      #0c1220;
      --sidebar: #111827;
      --card:    #1a2436;
      --border:  #263347;
      --text:    #f1f5f9;
      --text2:   #94a3b8;
      --text3:   #4e6176;
      --accent:  #6366f1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 230px; min-height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-brand { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .sidebar-brand h2 { font-size: 14px; font-weight: 700; }
    .sidebar-brand p  { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-section  { padding: 16px 0 8px; }
    .sidebar-label    { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 6px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; margin: 1px 8px; border-radius: 8px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .2s; }
    .nav-item:hover  { background: rgba(99,102,241,.1); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,.18); color: var(--accent); font-weight: 600; }
    .nav-dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .nav-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Main */
    .main-wrapper { margin-left: 230px; flex: 1; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar { background: var(--sidebar); border-bottom: 1px solid var(--border); padding: 11px 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; }
    .topbar-label { font-size: 11px; font-weight: 600; color: var(--text3); }
    .media-tabs, .quick-btns { display: flex; gap: 5px; }
    .media-tab, .quick-btn { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .media-tab:hover, .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
    .media-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .quick-btn.active { background: rgba(99,102,241,.2); border-color: var(--accent); color: var(--accent); }
    .topbar-sep { width: 1px; height: 22px; background: var(--border); }
    .date-range { display: flex; align-items: center; gap: 6px; }
    .date-input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 12px; color: var(--text); outline: none; color-scheme: dark; }
    .date-input:focus { border-color: var(--accent); }
    .date-sep { font-size: 12px; color: var(--text3); }

    /* Content */
    .content { padding: 22px 24px; display: flex; flex-direction: column; gap: 22px; }

    /* Info strip */
    .info-strip { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.2); border-radius: 10px; padding: 10px 16px; }
    .info-chip { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
    .info-chip strong { color: var(--text); }

    /* Section */
    .sec-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .sec-title::before { content:''; display:inline-block; width:3px; height:15px; background:var(--accent); border-radius:2px; }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
    .kpi-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .kpi-value { font-size: 20px; font-weight: 700; }
    .kpi-sub   { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Three col */
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 900px) { .three-col { grid-template-columns: 1fr; } }

    /* Charts */
    .chart-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
    .chart-sm { position: relative; height: 200px; }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead tr { background: rgba(255,255,255,.03); }
    th { padding: 9px 12px; text-align: right; font-weight: 600; color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th:first-child { text-align: left; }
    td { padding: 9px 12px; text-align: right; border-bottom: 1px solid rgba(255,255,255,.03); color: var(--text); }
    td:first-child { text-align: left; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tr.tbl-total td { font-weight: 700; color: #c7d2fe; border-top: 1px solid var(--border); border-bottom: none; background: rgba(99,102,241,.06); }

    /* Media section */
    .media-section { display: flex; flex-direction: column; gap: 14px; }
    .media-header { display: flex; align-items: center; gap: 10px; padding-bottom: 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .media-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px; font-size:13px; font-weight:700; }
    .badge-fb    { background:rgba(79,131,235,.15); color:#4f83eb; border:1px solid rgba(79,131,235,.3); }
    .badge-kakao { background:rgba(245,159,0,.15);  color:#f59f00; border:1px solid rgba(245,159,0,.3); }

    /* Dropdown */
    .custom-select {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; color: var(--text); outline: none;
      cursor: pointer; color-scheme: dark; min-width: 160px; max-width: 280px;
    }
    .custom-select:focus { border-color: var(--accent); }

    /* Sub section */
    .sub-sec-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .sub-sec-title span { display: flex; align-items: center; gap: 6px; }
    .sub-sec-title span::before { content:''; display:inline-block; width:3px; height:13px; background:var(--text3); border-radius:2px; }

    /* State */
    .state-box { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:12px; color:var(--text3); }
    .spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div style="font-size:22px">📊</div>
      <div><h2>광고 성과</h2><p>Dashboard</p></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">기획전</div>
      <div id="sidebarNav"></div>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="topbar">
      <span class="topbar-label">매체</span>
      <div class="media-tabs">
        <button class="media-tab active" data-media="all">전체</button>
        <button class="media-tab" data-media="meta">메타</button>
        <button class="media-tab" data-media="kakao">카카오</button>
      </div>
      <div class="topbar-sep"></div>
      <span class="topbar-label">기간</span>
      <div class="date-range">
        <input type="date" id="dateFrom" class="date-input" />
        <span class="date-sep">~</span>
        <input type="date" id="dateTo" class="date-input" />
      </div>
      <div class="topbar-sep"></div>
      <span class="topbar-label">최근</span>
      <div class="quick-btns">
        <button class="quick-btn" data-quick="all">전체</button>
        <button class="quick-btn" data-quick="yesterday">어제</button>
        <button class="quick-btn" data-quick="7days">7일</button>
        <button class="quick-btn" data-quick="14days">14일</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="state-box"><div class="spinner"></div><span>데이터 불러오는 중…</span></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoZ7VJvp5y0Bg8pzGzArUblfuGMpi8CsJxVEjDFxvdj1qeKICl4dc88ZauWHr_nFAdGFxQEO1kOA5p/pub?gid=0&single=true&output=csv';

Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#263347';

const COLORS = {
  fb:    { bg:'rgba(79,131,235,.8)',  border:'#4f83eb', light:'rgba(79,131,235,.15)' },
  kakao: { bg:'rgba(245,159,0,.8)',   border:'#f59f00', light:'rgba(245,159,0,.15)'  },
};
const PALETTE = [
  {bg:'rgba(99,102,241,.8)',border:'#6366f1'},{bg:'rgba(59,130,246,.8)',border:'#3b82f6'},
  {bg:'rgba(16,185,129,.8)',border:'#10b981'},{bg:'rgba(245,158,11,.8)',border:'#f59e0b'},
  {bg:'rgba(239,68,68,.8)',border:'#ef4444'}, {bg:'rgba(168,85,247,.8)',border:'#a855f7'},
  {bg:'rgba(20,184,166,.8)',border:'#14b8a6'},{bg:'rgba(249,115,22,.8)',border:'#f97316'},
  {bg:'rgba(236,72,153,.8)',border:'#ec4899'},{bg:'rgba(132,204,22,.8)',border:'#84cc16'},
  {bg:'rgba(6,182,212,.8)',border:'#06b6d4'}, {bg:'rgba(251,191,36,.8)',border:'#fbbf24'},
];
const pc = i => PALETTE[i % PALETTE.length];

const fmt = {
  won:  v => isNaN(+v) ? '-' : '₩' + Math.round(+v).toLocaleString('ko-KR'),
  num:  v => isNaN(+v) ? '-' : Math.round(+v).toLocaleString('ko-KR'),
  pct:  v => isNaN(+v) ? '-' : (+v).toFixed(2) + '%',
  roas: v => isNaN(+v) ? '-' : Math.round(+v) + '%',
};

function parseNum(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/[₩,%\s]/g,'').replace(/,/g,'')) || 0;
}
function colorOf(m) {
  const k=(m||'').toLowerCase();
  if (k.includes('facebook')||k.includes('meta')||k.includes('fb')) return COLORS.fb;
  if (k.includes('kakao')) return COLORS.kakao;
  return {bg:'rgba(148,163,184,.8)',border:'#94a3b8',light:'rgba(148,163,184,.15)'};
}
function isFb(m)    { const k=(m||'').toLowerCase(); return k.includes('facebook')||k.includes('meta')||k.includes('fb'); }
function isKakao(m) { return (m||'').toLowerCase().includes('kakao'); }
function addMetrics(r) { r.ctr=r.imp>0?r.clicks/r.imp*100:0; r.cpc=r.clicks>0?r.spent/r.clicks:0; r.roas=r.spent>0?r.revenue/r.spent*100:0; return r; }

// ── State ────────────────────────────────────────────────────
const state = { media:'all', dateFrom:null, dateTo:null, quick:null, event:null, adsetFilter:{} };
let parsed = null, charts = {}, _minD = '', _maxD = '';

// ── Parse ────────────────────────────────────────────────────
function parseRaw(data) {
  const rows = data.map(r => ({
    date:     (r['date']||'').trim(),
    media:    (r['media_source']||'').trim(),
    campaign: (r['campaign (캠페인명)']||'').trim(),
    adset:    (r['adset (그룹명)']||'').trim(),
    ads:      (r['ads (소재)']||'').trim(),
    spent:    parseNum(r['spent']),
    imp:      parseNum(r['imp']),
    clicks:   parseNum(r['clicks']),
    revenue:  parseNum(r['거래액']),
    orders:   parseNum(r['쇼핑 주문수(총)']),
    event:    (r['기획전명']||'').trim(),
  })).filter(r => r.date && /\d{4}-\d{2}-\d{2}/.test(r.date));

  const events = [...new Set(rows.map(r=>r.event).filter(Boolean))].sort();

  function agg(map) { return Object.values(map).map(r => addMetrics({...r})); }

  // Media-level
  const mMap = {};
  rows.forEach(r => {
    if (!mMap[r.media]) mMap[r.media]={media:r.media,spent:0,imp:0,clicks:0,revenue:0,orders:0,budget:0};
    const m=mMap[r.media]; m.spent+=r.spent; m.imp+=r.imp; m.clicks+=r.clicks; m.revenue+=r.revenue; m.orders+=r.orders;
  });

  // Adset-level
  const aMap = {};
  rows.forEach(r => {
    const k=r.media+'||'+r.adset;
    if (!aMap[k]) aMap[k]={media:r.media,campaign:r.campaign,adset:r.adset,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const m=aMap[k]; m.spent+=r.spent; m.imp+=r.imp; m.clicks+=r.clicks; m.revenue+=r.revenue; m.orders+=r.orders;
  });

  // Daily by (media × date)
  const dMap = {};
  rows.forEach(r => {
    const k=r.media+'||'+r.date;
    if (!dMap[k]) dMap[k]={media:r.media,date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const m=dMap[k]; m.spent+=r.spent; m.imp+=r.imp; m.clicks+=r.clicks; m.revenue+=r.revenue; m.orders+=r.orders;
  });

  // Daily by (media × adset × date)
  const adMap = {};
  rows.forEach(r => {
    const k=r.media+'||'+r.adset+'||'+r.date;
    if (!adMap[k]) adMap[k]={media:r.media,campaign:r.campaign,adset:r.adset,date:r.date,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const m=adMap[k]; m.spent+=r.spent; m.imp+=r.imp; m.clicks+=r.clicks; m.revenue+=r.revenue; m.orders+=r.orders;
  });

  // Ads (creative) by (media × adset × ads)
  const adsMap = {};
  rows.forEach(r => {
    const k=r.media+'||'+r.adset+'||'+r.ads;
    if (!adsMap[k]) adsMap[k]={media:r.media,campaign:r.campaign,adset:r.adset,ads:r.ads,spent:0,imp:0,clicks:0,revenue:0,orders:0};
    const m=adsMap[k]; m.spent+=r.spent; m.imp+=r.imp; m.clicks+=r.clicks; m.revenue+=r.revenue; m.orders+=r.orders;
  });

  return {
    events,
    mediaRows:    agg(mMap),
    adsetRows:    agg(aMap),
    dailyRows:    agg(dMap).sort((a,b)=>a.date.localeCompare(b.date)),
    adsetDailyRows: agg(adMap).sort((a,b)=>a.date.localeCompare(b.date)),
    adsRows:      agg(adsMap),
  };
}

// ── Load ─────────────────────────────────────────────────────
function loadData() {
  Papa.parse(CSV_URL, {
    download:true, header:true, skipEmptyLines:true,
    complete:({data}) => { parsed=parseRaw(data); initUI(); render(); },
    error:err => { document.getElementById('content').innerHTML=`<div class="state-box">⚠️ 오류: ${err.message}</div>`; }
  });
}

// ── Init UI ──────────────────────────────────────────────────
function initUI() {
  const nav = document.getElementById('sidebarNav');
  state.event = parsed.events[0]||null;
  nav.innerHTML = parsed.events.map((e,i)=>
    `<div class="nav-item ${i===0?'active':''}" data-event="${e}"><span class="nav-dot"></span><span class="nav-text" title="${e}">${e}</span></div>`
  ).join('');
  nav.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('click',()=>{
      state.event=item.dataset.event;
      nav.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      item.classList.add('active'); render();
    });
  });

  const allDates=parsed.dailyRows.map(r=>r.date).sort();
  _minD=allDates[0]||''; _maxD=allDates[allDates.length-1]||'';
  state.dateFrom=_minD; state.dateTo=_maxD;
  document.getElementById('dateFrom').value=_minD;
  document.getElementById('dateTo').value=_maxD;

  document.querySelectorAll('.media-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.media=btn.dataset.media; state.quick=null;
      document.querySelectorAll('.media-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); render();
    });
  });

  document.getElementById('dateFrom').addEventListener('change',e=>{state.dateFrom=e.target.value;state.quick=null;clearQuick();render();});
  document.getElementById('dateTo').addEventListener('change',e=>{state.dateTo=e.target.value;state.quick=null;clearQuick();render();});

  document.querySelectorAll('.quick-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const q=btn.dataset.quick;
      if (state.quick===q && q!=='all') { state.quick=null; clearQuick(); setDates(_minD,_maxD); }
      else {
        state.quick=q; clearQuick(); btn.classList.add('active');
        if (q==='all') { setDates(_minD,_maxD); }
        else {
          const d=new Date(_maxD);
          if (q==='yesterday') { d.setDate(d.getDate()-1); const s=d.toISOString().slice(0,10); setDates(s,s); }
          else if (q==='7days')  { d.setDate(d.getDate()-6);  setDates(d.toISOString().slice(0,10),_maxD); }
          else if (q==='14days') { d.setDate(d.getDate()-13); setDates(d.toISOString().slice(0,10),_maxD); }
        }
      }
      render();
    });
  });
}

function clearQuick() { document.querySelectorAll('.quick-btn').forEach(b=>b.classList.remove('active')); }
function setDates(from,to) {
  state.dateFrom=from; state.dateTo=to;
  document.getElementById('dateFrom').value=from;
  document.getElementById('dateTo').value=to;
}

// ── Filtered helpers ─────────────────────────────────────────
function filterMedia(r) {
  if (state.media==='meta'  && !isFb(r.media))    return false;
  if (state.media==='kakao' && !isKakao(r.media)) return false;
  return true;
}
function filterDate(r) {
  if (state.dateFrom && r.date < state.dateFrom) return false;
  if (state.dateTo   && r.date > state.dateTo)   return false;
  return true;
}

// ── Comp data ─────────────────────────────────────────────────
function getCompData() {
  if (state.media==='all') {
    const rows=parsed.mediaRows;
    return { type:'media', rows, labels:rows.map(r=>r.media), spent:rows.map(r=>r.spent), revenue:rows.map(r=>r.revenue), clicks:rows.map(r=>r.clicks), ctr:rows.map(r=>r.ctr), imp:rows.map(r=>r.imp), cpc:rows.map(r=>r.cpc), roas:rows.map(r=>r.roas), orders:rows.map(r=>r.orders), colors:rows.map(r=>colorOf(r.media)) };
  }
  const rows=parsed.adsetRows.filter(filterMedia);
  return { type:'adset', rows, labels:rows.map(r=>r.adset), spent:rows.map(r=>r.spent), revenue:rows.map(r=>r.revenue), clicks:rows.map(r=>r.clicks), ctr:rows.map(r=>r.ctr), imp:rows.map(r=>r.imp), cpc:rows.map(r=>r.cpc), roas:rows.map(r=>r.roas), orders:rows.map(r=>r.orders), colors:rows.map((_,i)=>pc(i)) };
}

// ── Render ────────────────────────────────────────────────────
function render() {
  if (!parsed) return;
  const comp  = getCompData();
  const dRows = parsed.dailyRows.filter(r=>filterMedia(r)&&filterDate(r));
  const dailyMedias = [...new Set(dRows.map(r=>r.media))];

  const total={spent:0,revenue:0,imp:0,clicks:0,orders:0};
  dRows.forEach(r=>{total.spent+=r.spent;total.revenue+=r.revenue;total.imp+=r.imp;total.clicks+=r.clicks;total.orders+=r.orders||0;});
  total.ctr  = total.imp>0    ? total.clicks/total.imp*100    : 0;
  total.roas = total.spent>0  ? total.revenue/total.spent*100 : 0;
  total.cpc  = total.clicks>0 ? total.spent/total.clicks      : 0;

  const dateStr = state.dateFrom===state.dateTo ? state.dateFrom : `${state.dateFrom} ~ ${state.dateTo}`;
  const isMediaTab = state.media !== 'all';

  document.getElementById('content').innerHTML = `
    <div class="info-strip">
      <div class="info-chip">📌 기획전: <strong>${state.event||'-'}</strong></div>
      <div class="info-chip">📅 기간: <strong>${dateStr||'-'}</strong></div>
    </div>

    <div>
      <div class="sec-title">전체 요약</div>
      <div class="kpi-grid" id="kpiGrid"></div>
    </div>

    <div>
      <div class="sec-title">${isMediaTab ? '그룹별 누적 성과 비중' : '매체별 누적 성과 비중'}</div>
      <div class="three-col">
        <div class="card"><div class="chart-label">💰 비용 지출 비중</div><div class="chart-sm"><canvas id="cSpent"></canvas></div></div>
        <div class="card"><div class="chart-label">🛒 거래액 비중</div><div class="chart-sm"><canvas id="cRevenue"></canvas></div></div>
        <div class="card"><div class="chart-label">👆 클릭수 / CTR 비교</div><div class="chart-sm"><canvas id="cCTR"></canvas></div></div>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="sub-sec-title"><span>${isMediaTab ? '그룹별 성과' : '매체별 성과'}</span></div>
        <div class="tbl-wrap" id="compTable"></div>
      </div>
    </div>

    <div id="dailySections"></div>
  `;

  renderKPI(total);
  renderDonut('cSpent',   comp.labels, comp.spent,   comp.colors);
  renderDonut('cRevenue', comp.labels, comp.revenue, comp.colors);
  renderCTRChart(comp);
  renderCompTable(comp, total);
  renderDailySections(dailyMedias, dRows);
}

// ── KPI ──────────────────────────────────────────────────────
function renderKPI(t) {
  document.getElementById('kpiGrid').innerHTML=[
    {label:'총 광고비',value:fmt.won(t.spent),   sub:'집행 비용 합계'},
    {label:'총 거래액',value:fmt.won(t.revenue), sub:'ROAS: '+fmt.roas(t.roas)},
    {label:'총 노출수',value:fmt.num(t.imp),     sub:'전체 노출 합계'},
    {label:'총 클릭수',value:fmt.num(t.clicks),  sub:'CPC: '+fmt.won(t.cpc)},
    {label:'평균 CTR', value:fmt.pct(t.ctr),     sub:'Clicks ÷ Impressions'},
  ].map(c=>`<div class="kpi-card"><div class="kpi-label">${c.label}</div><div class="kpi-value">${c.value}</div><div class="kpi-sub">${c.sub}</div></div>`).join('');
}

// ── Charts ────────────────────────────────────────────────────
function dc(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

function renderDonut(id, labels, values, colors) {
  dc(id);
  const total=values.reduce((s,v)=>s+v,0);
  const ctx=document.getElementById(id)?.getContext('2d'); if(!ctx)return;
  const many=labels.length>4;
  const sl=labels.map(l=>l.length>18?l.slice(0,17)+'…':l);
  charts[id]=new Chart(ctx,{
    type:'doughnut',
    data:{labels:sl,datasets:[{data:values,backgroundColor:colors.map(c=>c.bg),borderColor:colors.map(c=>c.border),borderWidth:2,hoverOffset:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{
        legend:{position:'bottom',labels:{font:{size:many?9:11},padding:many?6:12,color:'#94a3b8',boxWidth:10}},
        tooltip:{callbacks:{label:c=>{const p=total>0?(c.raw/total*100).toFixed(1):0;return ` ${c.label}: ${fmt.won(c.raw)} (${p}%)`;}}}
      }
    }
  });
}

function renderCTRChart(comp) {
  dc('cCTR');
  const ctx=document.getElementById('cCTR')?.getContext('2d'); if(!ctx)return;
  const many=comp.labels.length>4;
  const sl=comp.labels.map(l=>l.length>16?l.slice(0,15)+'…':l);
  charts['cCTR']=new Chart(ctx,{
    data:{labels:sl,datasets:[
      {type:'bar',  label:'클릭수',data:comp.clicks,backgroundColor:comp.colors.map(c=>c.bg),borderColor:comp.colors.map(c=>c.border),borderWidth:1,borderRadius:4,yAxisID:'yL'},
      {type:'line', label:'CTR (%)',data:comp.ctr,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',borderWidth:2,pointRadius:many?3:6,pointBackgroundColor:'#22c55e',yAxisID:'yR',tension:0.3,fill:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:11},padding:10,color:'#94a3b8'}},tooltip:{callbacks:{label:c=>c.dataset.label==='CTR (%)'?` CTR: ${(+c.raw).toFixed(2)}%`:` 클릭수: ${fmt.num(c.raw)}`}}},
      scales:{
        yL:{type:'linear',position:'left',ticks:{callback:v=>fmt.num(v),font:{size:10}},grid:{color:'#263347'},title:{display:true,text:'클릭수',font:{size:10},color:'#64748b'}},
        yR:{type:'linear',position:'right',ticks:{callback:v=>v+'%',font:{size:10}},grid:{drawOnChartArea:false},title:{display:true,text:'CTR',font:{size:10},color:'#64748b'}},
        x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:many?9:11},maxRotation:many?50:0,maxTicksLimit:10}}
      }
    }
  });
}

// ── Comparison table ──────────────────────────────────────────
function renderCompTable(comp, total) {
  const isAdset=comp.type==='adset';
  const firstTh=isAdset?'그룹명':'매체';
  const tS=comp.spent.reduce((s,v)=>s+v,0), tR=comp.revenue.reduce((s,v)=>s+v,0);
  const tbody=comp.rows.map((r,i)=>{
    const sp=tS>0?(r.spent/tS*100).toFixed(1):0;
    const rp=tR>0?(r.revenue/tR*100).toFixed(1):0;
    const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${comp.colors[i].border};margin-right:6px;flex-shrink:0"></span>`;
    const name=isAdset?r.adset:r.media;
    return `<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dot}${name}</td><td>${fmt.won(r.spent)} <small style="color:var(--text3)">(${sp}%)</small></td><td>${fmt.won(r.revenue)} <small style="color:var(--text3)">(${rp}%)</small></td><td>${fmt.roas(r.roas)}</td><td>${fmt.num(r.imp)}</td><td>${fmt.num(r.clicks)}</td><td>${fmt.pct(r.ctr)}</td><td>${fmt.won(r.cpc)}</td><td>${fmt.num(r.orders)}</td></tr>`;
  }).join('');
  const ctr=total.imp>0?total.clicks/total.imp*100:0, cpc=total.clicks>0?total.spent/total.clicks:0;
  document.getElementById('compTable').innerHTML=`
    <table>
      <thead><tr><th>${firstTh}</th><th>광고비</th><th>거래액</th><th>ROAS</th><th>노출수</th><th>클릭수</th><th>CTR</th><th>CPC</th><th>주문수</th></tr></thead>
      <tbody>${tbody}<tr class="tbl-total"><td>합계</td><td>${fmt.won(total.spent)}</td><td>${fmt.won(total.revenue)}</td><td>${fmt.roas(total.roas)}</td><td>${fmt.num(total.imp)}</td><td>${fmt.num(total.clicks)}</td><td>${fmt.pct(ctr)}</td><td>${fmt.won(cpc)}</td><td>${fmt.num(total.orders)}</td></tr></tbody>
    </table>`;
}

// ── Daily sections ────────────────────────────────────────────
function renderDailySections(mediaList, dRows) {
  const el=document.getElementById('dailySections'); if(!mediaList.length){el.innerHTML='';return;}

  el.innerHTML=mediaList.map((media,idx)=>{
    const cls=isFb(media)?'badge-fb':'badge-kakao';
    // Adsets for this media
    const adsets=[...new Set(parsed.adsetRows.filter(r=>r.media===media).map(r=>r.adset))].sort();
    const selAdset=state.adsetFilter[media]||'';
    const adsetOptions=`<option value="">전체 그룹</option>`+adsets.map(a=>`<option value="${a}" ${a===selAdset?'selected':''}>${a}</option>`).join('');

    return `<div class="media-section" id="ms_${idx}">
      <div class="media-header">
        <span class="media-badge ${cls}">${media}</span>
        <span style="font-size:13px;font-weight:600;color:var(--text2)">일별 누적 성과</span>
        ${adsets.length>1?`<select class="custom-select adset-main-sel" data-media="${media}" data-idx="${idx}">${adsetOptions}</select>`:''}
      </div>

      <div class="three-col">
        <div class="card"><div class="chart-label">📈 일별 노출수 / 클릭수</div><div class="chart-sm"><canvas id="cIC_${idx}"></canvas></div></div>
        <div class="card"><div class="chart-label">💵 일별 CPC 변화</div><div class="chart-sm"><canvas id="cCPC_${idx}"></canvas></div></div>
        <div class="card"><div class="chart-label">🛒 일별 거래액 / ROAS</div><div class="chart-sm"><canvas id="cRev_${idx}"></canvas></div></div>
      </div>

      <div class="card">
        <div class="sub-sec-title"><span>일별 상세 데이터</span></div>
        <div class="tbl-wrap" id="dTbl_${idx}"></div>
      </div>

      <div class="card">
        <div class="sub-sec-title"><span>소재별 성과</span></div>
        <div class="tbl-wrap" id="adsTbl_${idx}"></div>
      </div>
    </div>`;
  }).join('');

  // Attach dropdown listeners
  document.querySelectorAll('.adset-main-sel').forEach(sel=>{
    sel.addEventListener('change', e=>{
      state.adsetFilter[e.target.dataset.media] = e.target.value;
      render();
    });
  });

  mediaList.forEach((media,idx) => buildMediaCharts(media, idx, dRows));
}

function buildMediaCharts(media, idx, dRows) {
  const selAdset = state.adsetFilter[media] || '';
  const c = colorOf(media);

  // Daily rows for charts: filtered by adset if selected
  let rows;
  if (selAdset) {
    rows = parsed.adsetDailyRows.filter(r => r.media===media && r.adset===selAdset && filterDate(r)).sort((a,b)=>a.date.localeCompare(b.date));
  } else {
    rows = dRows.filter(r=>r.media===media).sort((a,b)=>a.date.localeCompare(b.date));
  }
  const dates = rows.map(r=>r.date);

  dc(`cIC_${idx}`);
  const ctx1=document.getElementById(`cIC_${idx}`)?.getContext('2d');
  if(ctx1) charts[`cIC_${idx}`]=new Chart(ctx1,{
    data:{labels:dates,datasets:[
      {type:'bar',label:'노출수',data:rows.map(r=>r.imp),backgroundColor:c.light,borderColor:c.border,borderWidth:1,borderRadius:3,yAxisID:'yL'},
      {type:'line',label:'클릭수',data:rows.map(r=>r.clicks),borderColor:'#22c55e',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#22c55e',yAxisID:'yR',tension:0.3}
    ]},options:dualOpts(v=>fmt.num(v),v=>fmt.num(v),'노출수','클릭수')
  });

  dc(`cCPC_${idx}`);
  const ctx2=document.getElementById(`cCPC_${idx}`)?.getContext('2d');
  if(ctx2) charts[`cCPC_${idx}`]=new Chart(ctx2,{
    type:'line',
    data:{labels:dates,datasets:[{label:'CPC',data:rows.map(r=>r.cpc),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.1)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#f97316',tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' CPC: '+fmt.won(c.raw)}}},scales:{y:{ticks:{callback:v=>'₩'+(v>=1000?(v/1000).toFixed(0)+'K':v),font:{size:10}},grid:{color:'#263347'}},x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:10},maxRotation:45,maxTicksLimit:8}}}}
  });

  dc(`cRev_${idx}`);
  const ctx3=document.getElementById(`cRev_${idx}`)?.getContext('2d');
  if(ctx3) charts[`cRev_${idx}`]=new Chart(ctx3,{
    data:{labels:dates,datasets:[
      {type:'bar',label:'거래액',data:rows.map(r=>r.revenue),backgroundColor:c.bg,borderColor:c.border,borderWidth:0,borderRadius:3,yAxisID:'yL'},
      {type:'line',label:'ROAS',data:rows.map(r=>r.roas),borderColor:'#a78bfa',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#a78bfa',yAxisID:'yR',tension:0.3}
    ]},options:dualOpts(v=>'₩'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v),v=>Math.round(v)+'%','거래액','ROAS')
  });

  // Daily table
  const sub={spent:0,imp:0,clicks:0,revenue:0,orders:0};
  rows.forEach(r=>{sub.spent+=r.spent;sub.imp+=r.imp;sub.clicks+=r.clicks;sub.revenue+=r.revenue;sub.orders+=r.orders||0;});
  const sCtr=sub.imp>0?sub.clicks/sub.imp*100:0, sCpc=sub.clicks>0?sub.spent/sub.clicks:0, sRoas=sub.spent>0?sub.revenue/sub.spent*100:0;
  const showCols = !!selAdset; // 그룹 선택 시 캠페인/그룹명 컬럼 표시
  document.getElementById(`dTbl_${idx}`).innerHTML=`
    <table>
      <thead><tr>
        <th>일자</th>
        ${showCols?`<th style="text-align:left">캠페인</th><th style="text-align:left">그룹명</th>`:''}
        <th>비용</th><th>노출수</th><th>클릭수</th><th>CTR</th><th>CPC</th><th>거래액</th><th>ROAS</th><th>주문수</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td>${r.date}</td>
          ${showCols?`<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left">${r.campaign||'-'}</td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left">${r.adset||'-'}</td>`:''}
          <td>${fmt.won(r.spent)}</td><td>${fmt.num(r.imp)}</td><td>${fmt.num(r.clicks)}</td><td>${fmt.pct(r.ctr)}</td><td>${fmt.won(r.cpc)}</td><td>${fmt.won(r.revenue)}</td><td>${fmt.roas(r.roas)}</td><td>${fmt.num(r.orders||0)}</td>
        </tr>`).join('')}
        <tr class="tbl-total">
          <td>합계</td>
          ${showCols?`<td>-</td><td>-</td>`:''}
          <td>${fmt.won(sub.spent)}</td><td>${fmt.num(sub.imp)}</td><td>${fmt.num(sub.clicks)}</td><td>${fmt.pct(sCtr)}</td><td>${fmt.won(sCpc)}</td><td>${fmt.won(sub.revenue)}</td><td>${fmt.roas(sRoas)}</td><td>${fmt.num(sub.orders)}</td>
        </tr>
      </tbody>
    </table>`;

  // Creative (ads) table
  let adsRows = parsed.adsRows.filter(r => r.media===media);
  if (selAdset) adsRows = adsRows.filter(r => r.adset===selAdset);
  adsRows = adsRows.sort((a,b) => b.spent-a.spent);

  const aSub={spent:0,imp:0,clicks:0,revenue:0,orders:0};
  adsRows.forEach(r=>{aSub.spent+=r.spent;aSub.imp+=r.imp;aSub.clicks+=r.clicks;aSub.revenue+=r.revenue;aSub.orders+=r.orders||0;});
  const aCtr=aSub.imp>0?aSub.clicks/aSub.imp*100:0, aCpc=aSub.clicks>0?aSub.spent/aSub.clicks:0, aRoas=aSub.spent>0?aSub.revenue/aSub.spent*100:0;

  const td = s => `style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left"`;
  document.getElementById(`adsTbl_${idx}`).innerHTML=`
    <table>
      <thead><tr><th style="text-align:left">캠페인</th><th style="text-align:left">그룹명</th><th style="text-align:left">소재명</th><th>비용</th><th>노출수</th><th>클릭수</th><th>CTR</th><th>CPC</th><th>거래액</th><th>ROAS</th></tr></thead>
      <tbody>
        ${adsRows.map(r=>`<tr>
          <td ${td()}>${r.campaign||'-'}</td>
          <td ${td()}>${r.adset||'-'}</td>
          <td ${td()}>${r.ads||'-'}</td>
          <td>${fmt.won(r.spent)}</td><td>${fmt.num(r.imp)}</td><td>${fmt.num(r.clicks)}</td><td>${fmt.pct(r.ctr)}</td><td>${fmt.won(r.cpc)}</td><td>${fmt.won(r.revenue)}</td><td>${fmt.roas(r.roas)}</td>
        </tr>`).join('')}
        <tr class="tbl-total"><td>합계</td><td>-</td><td>-</td><td>${fmt.won(aSub.spent)}</td><td>${fmt.num(aSub.imp)}</td><td>${fmt.num(aSub.clicks)}</td><td>${fmt.pct(aCtr)}</td><td>${fmt.won(aCpc)}</td><td>${fmt.won(aSub.revenue)}</td><td>${fmt.roas(aRoas)}</td></tr>
      </tbody>
    </table>`;
}

function dualOpts(fmtL,fmtR,labelL,labelR) {
  return {
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,color:'#94a3b8',boxWidth:10}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='yR'?` ${c.dataset.label}: ${fmtR(c.raw)}`:` ${c.dataset.label}: ${fmtL(c.raw)}`}}},
    scales:{
      yL:{type:'linear',position:'left',ticks:{callback:fmtL,font:{size:9}},grid:{color:'#263347'},title:{display:true,text:labelL,font:{size:9},color:'#64748b'}},
      yR:{type:'linear',position:'right',ticks:{callback:fmtR,font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:labelR,font:{size:9},color:'#64748b'}},
      x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9},maxRotation:45,maxTicksLimit:8}}
    }
  };
}

loadData();
</script>
</body>
</html>
